<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Search</title>
    <link rel="stylesheet" href="./reset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css"
        integrity="sha512-9xKTRVabjVeZmc+GUW8GgSmcREDunMM+Dt/GrzchfN8tkwHizc5RP4Ok/MXFFy5rIjJjzhndFScTceq5e6GvVQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <div class="search-group">
            <div class="search">
                <button>
                    <img src="./imgs/search.svg" alt="search">
                </button>
                <input type="search" name="search" id="search" placeholder="Search for a part-time job">
            </div>

            <button class="use-map">
                <img src="./imgs/map.svg" alt="map">
                <span>Use map</span>
            </button>
        </div>

        <div class="job-group">
            <div class="job furniture">
                <img src="./imgs/furniture.svg" alt="furniture">
                <p class="job-name">Furniture</p>
            </div>
            <div class="job property">
                <img src="./imgs/property.svg" alt="property">
                <p class="job-name">Property</p>
            </div>
            <div class="job jobs">
                <img src="./imgs/job.svg" alt="job">
                <p class="job-name">Job</p>
            </div>
            <div class="job travel">
                <img src="./imgs/plane.svg" alt="travel">
                <p class="job-name">Travel</p>
            </div>
            <div class="job boat">
                <img src="./imgs/boat.svg" alt="boat">
                <p class="job-name">Boat</p>
            </div>
            <div class="job mc">
                <img src="./imgs/mc.svg" alt="mc">
                <p class="job-name">MC</p>
            </div>
            <div class="job economy">
                <img src="./imgs/economy.svg" alt="economy">
                <p class="job-name">Economy</p>
            </div>
            <div class="job holiday">
                <img src="./imgs/holiday.svg" alt="holiday">
                <p class="job-name">Holiday</p>
            </div>
        </div>
    </div>
</body>

</html>
